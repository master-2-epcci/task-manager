name: CI

on:
  push:
    branches: ["main"]

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm ci
      - run: npx prisma generate
      - run: npm run build

      # Connexion au registre GitHub
      - name: Login GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Image canonique : ghcr.io/<owner>/<nom-du-depot>:latest (visible sous Packages du dépôt)
      # Alias next-app : garde la compatibilité si ton docker-compose sur le VPS utilise encore ce chemin
      - name: Build & Push
        run: |
          docker build \
            -t ghcr.io/${{ github.repository }}:latest \
            -t ghcr.io/${{ github.repository_owner }}/next-app:latest \
            .
          docker push ghcr.io/${{ github.repository }}:latest
          docker push ghcr.io/${{ github.repository_owner }}/next-app:latest

      # Déploiement automatique sur le VPS
      # Nécessite le secret GHCR_TOKEN : PAT GitHub avec le droit read:packages
      # (sans ça, docker compose pull échoue avec "denied" sur une image privée)
      - name: Deploy via SSH
        env:
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
          GHCR_USER: ${{ github.repository_owner }}
          DEPLOY_IMAGE: ghcr.io/${{ github.repository }}:latest
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          envs: GHCR_TOKEN,GHCR_USER,DEPLOY_IMAGE
          script: |
            echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_USER" --password-stdin
            cd app
            export APP_IMAGE="$DEPLOY_IMAGE"
            docker compose -f docker-compose.prod.yml pull
            docker compose -f docker-compose.prod.yml up -d
            docker logout ghcr.io


